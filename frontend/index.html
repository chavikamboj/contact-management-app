<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Management App</title>
  <link rel="stylesheet" href="./style.css" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const API = "http://localhost:5000";

    function App() {
      const [contacts, setContacts] = React.useState([]);
      const [searchTerm, setSearchTerm] = React.useState("");
      const [toast, setToast] = React.useState({ show: false, message: "", type: "success" });
      const [form, setForm] = React.useState({
        name: "",
        email: "",
        phone: "",
      });

      const showToast = (message, type = "success") => {
        setToast({ show: true, message, type });
        setTimeout(() => {
          setToast({ show: false, message: "", type: "success" });
        }, 2500);
      };

      const fetchContacts = async () => {
        try {
          const res = await axios.get(`${API}/api/contacts`);
          setContacts(res.data);
        } catch (error) {
          console.error("Error fetching contacts:", error);
          showToast("Failed to fetch data from the backend", "error");
        }
      };

      React.useEffect(() => {
        fetchContacts();
      }, []);

      const handleChange = (e) => {
        setForm({ ...form, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();

        if (!form.name || !form.email || !form.phone) {
          showToast("Please fill all fields", "error");
          return;
        }

        try {
          await axios.post(`${API}/api/contacts`, form);
          setForm({ name: "", email: "", phone: "" });
          fetchContacts();
          showToast("Contact added successfully", "success");
        } catch (error) {
          console.error("Error adding contact:", error);
          showToast("Contact is not added", "error");
        }
      };

      const deleteContact = async (id) => {
        try {
          await axios.delete(`${API}/api/contacts/${id}`);
          fetchContacts();
          showToast("Contact deleted successfully", "success");
        } catch (error) {
          console.error("Error deleting contact:", error);
          showToast("Delete nahi hua", "error");
        }
      };

      const filteredContacts = contacts.filter((contact) =>
        contact.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        contact.email.toLowerCase().includes(searchTerm.toLowerCase()) ||
        contact.phone.toLowerCase().includes(searchTerm.toLowerCase())
      );

      return (
        <div className="page">
          {toast.show && (
            <div className={`toast ${toast.type}`}>
              <span className="toast-dot"></span>
              <span>{toast.message}</span>
            </div>
          )}

          <div className="container">
            <div className="hero">
              <div className="hero-top">
                <span className="badge">MERN Stack Project</span>
              </div>
              <h1>Contact Management App</h1>
              <p className="subtitle">
                Organize, manage and access your contacts with a clean, modern and stylish interface.
              </p>
            </div>

            <div className="panel">
              <div className="panel-header">
                <h2>Add New Contact</h2>
                <p>Save contact details quickly and securely.</p>
              </div>

              <form onSubmit={handleSubmit} className="form-grid">
                <div className="field">
                  <label>Full Name</label>
                  <input
                    type="text"
                    name="name"
                    placeholder="Enter full name"
                    value={form.name}
                    onChange={handleChange}
                  />
                </div>

                <div className="field">
                  <label>Email Address</label>
                  <input
                    type="email"
                    name="email"
                    placeholder="Enter email address"
                    value={form.email}
                    onChange={handleChange}
                  />
                </div>

                <div className="field">
                  <label>Phone Number</label>
                  <input
                    type="text"
                    name="phone"
                    placeholder="Enter phone number"
                    value={form.phone}
                    onChange={handleChange}
                  />
                </div>

                <button type="submit" className="primary-btn">
                  Add Contact
                </button>
              </form>
            </div>

            <div className="stats-row">
              <div className="stat-card">
                <span className="stat-value">{contacts.length}</span>
                <span className="stat-label">Total Contacts</span>
              </div>

              <div className="stat-card">
                <span className="stat-value">MongoDB</span>
                <span className="stat-label">Database</span>
              </div>

              <div className="stat-card">
                <span className="stat-value">MERN</span>
                <span className="stat-label">Tech Stack</span>
              </div>
            </div>

            <div className="panel">
              <div className="contacts-top">
                <div>
                  <h2>All Contacts</h2>
                  <p>Search and manage saved contacts.</p>
                </div>

                <div className="search-box">
                  <input
                    type="text"
                    placeholder="Search by name, email or phone"
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                </div>
              </div>

              {filteredContacts.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-icon">📭</div>
                  <h3>No contacts found</h3>
                  <p>Try adding a contact or searching with another keyword.</p>
                </div>
              ) : (
                <div className="contact-grid">
                  {filteredContacts.map((contact) => (
                    <div key={contact._id} className="contact-card">
                      <div className="contact-head">
                        <div className="avatar">
                          {contact.name ? contact.name.charAt(0).toUpperCase() : "C"}
                        </div>

                        <div className="contact-name-wrap">
                          <h3>{contact.name}</h3>
                          <span>Saved Contact</span>
                        </div>
                      </div>

                      <div className="contact-info">
                        <div className="info-block">
                          <small>Email</small>
                          <p>{contact.email}</p>
                        </div>

                        <div className="info-block">
                          <small>Phone</small>
                          <p>{contact.phone}</p>
                        </div>
                      </div>

                      <button
                        className="delete-btn"
                        onClick={() => deleteContact(contact._id)}
                      >
                        Delete
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
